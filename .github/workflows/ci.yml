# ═══════════════════════════════════════════════════════════════════════════
# CONTINUOUS INTEGRATION WORKFLOW
# ═══════════════════════════════════════════════════════════════════════════
#
# Runs on every push and pull request to ensure code quality.
#
# ═══════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches:
      - main
      - 'feature/*'
      - 'fix/*'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # BUILD AND TEST
  # ─────────────────────────────────────────────────────────────────────────

  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────
  # TYPE CHECK
  # ─────────────────────────────────────────────────────────────────────────

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.json

  # ─────────────────────────────────────────────────────────────────────────
  # CONTRACT TESTS (Blueprint §4)
  # ─────────────────────────────────────────────────────────────────────────

  contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Provision test database from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null) || true
          if [ -z "$TAG" ]; then
            echo "::warning::No GitHub Release found — search contract tests will fail"
            exit 0
          fi
          gh release download "$TAG" -p "database.db.gz" -D /tmp/ 2>/dev/null || \
            gh release download "$TAG" -p "database-free.db.gz" -D /tmp/ 2>/dev/null || true
          if [ -f /tmp/database.db.gz ]; then
            gunzip -c /tmp/database.db.gz > data/database.db
          elif [ -f /tmp/database-free.db.gz ]; then
            gunzip -c /tmp/database-free.db.gz > data/database.db
          fi
          if [ -f data/database.db ] && [ "$(wc -c < data/database.db)" -gt 1024 ]; then
            echo "Database provisioned from release $TAG ($(du -sh data/database.db | cut -f1))"
          else
            echo "::warning::No database available — search contract tests will fail"
          fi
      - run: npm run test:contract

  contract-tests-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule'
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Provision test database from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null) || true
          if [ -z "$TAG" ]; then
            echo "::warning::No GitHub Release found — search contract tests will fail"
            exit 0
          fi
          gh release download "$TAG" -p "database.db.gz" -D /tmp/ 2>/dev/null || \
            gh release download "$TAG" -p "database-free.db.gz" -D /tmp/ 2>/dev/null || true
          if [ -f /tmp/database.db.gz ]; then
            gunzip -c /tmp/database.db.gz > data/database.db
          elif [ -f /tmp/database-free.db.gz ]; then
            gunzip -c /tmp/database-free.db.gz > data/database.db
          fi
          if [ -f data/database.db ] && [ "$(wc -c < data/database.db)" -gt 1024 ]; then
            echo "Database provisioned from release $TAG ($(du -sh data/database.db | cut -f1))"
          else
            echo "::warning::No database available — search contract tests will fail"
          fi
      - run: CONTRACT_MODE=nightly npm run test:contract
